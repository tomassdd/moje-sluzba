<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>TomChat</title>

<style>
  body {
    margin: 0;
    font-family: system-ui, Arial;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  h1 {
    text-align: center;
    margin: 15px 0;
    font-weight: 500;
  }

  #chat {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 15px;
    overflow-y: auto;
    gap: 10px;
  }

  .msg {
    padding: 12px 15px;
    border-radius: 18px;
    max-width: 70%;
    line-height: 1.4;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    animation: fadeIn 0.2s ease;
  }

  .user {
    background: #3b82f6;
    align-self: flex-end;
    border-bottom-right-radius: 5px;
  }

  .ai {
    background: #22c55e;
    align-self: flex-start;
    border-bottom-left-radius: 5px;
  }

  #input-area {
    display: flex;
    padding: 10px;
    background: #020617;
    border-top: 1px solid #334155;
  }

  input {
    flex: 1;
    padding: 12px;
    border-radius: 12px;
    border: none;
    outline: none;
    background: #1e293b;
    color: white;
  }

  button {
    margin-left: 10px;
    padding: 12px 18px;
    border: none;
    border-radius: 12px;
    background: #3b82f6;
    color: white;
    cursor: pointer;
    font-weight: 500;
  }

  button:hover {
    background: #2563eb;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>

<body>

<h1>TomChat</h1>

<div id="chat"></div>

<div id="input-area">
  <input id="prompt" placeholder="Zeptej se na cokoliv...">
  <button onclick="poslat()">Odeslat</button>
</div>

<script>
const chat = document.getElementById("chat");

function pridejZpravu(text, typ) {
  const div = document.createElement("div");
  div.className = "msg " + typ;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function poslat() {
  const input = document.getElementById("prompt");
  const text = input.value.trim();

  if (!text) return;

  pridejZpravu(text, "user");
  input.value = "";

  const loading = document.createElement("div");
  loading.className = "msg ai";
  loading.innerText = "⏳ AI přemýšlí...";
  chat.appendChild(loading);
  chat.scrollTop = chat.scrollHeight;

  try {
    const res = await fetch("/ai", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ prompt: text })
    });

    const data = await res.json();

    loading.remove();
    pridejZpravu(data.odpoved || data.error, "ai");

  } catch {
    loading.remove();
    pridejZpravu("❌ Chyba serveru", "ai");
  }
}

// ENTER odeslání
document.getElementById("prompt").addEventListener("keypress", function(e) {
  if (e.key === "Enter") poslat();
});
</script>

</body>
</html>
