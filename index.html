<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>AI Chat</title>

<style>
  body {
    margin: 0;
    font-family: system-ui;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .container {
    width: 480px;
    height: 680px;
    background: #020617;
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  h1 {
    text-align: center;
    padding: 10px;
  }

  #chat {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
    display: none;
  }

  .msg {
    padding: 10px;
    margin: 5px;
    border-radius: 12px;
    max-width: 70%;
  }

  .user { background: #3b82f6; align-self: flex-end; }
  .ai { background: #22c55e; align-self: flex-start; }

  #login {
    padding: 20px;
  }

  input {
    width: 100%;
    margin: 5px 0;
    padding: 10px;
  }

  button {
    width: 100%;
    margin-top: 5px;
    padding: 10px;
    background: #3b82f6;
    color: white;
    border: none;
  }
</style>
</head>

<body>

<div class="container">

  <div id="login">
    <h1>Login</h1>
    <input id="username" placeholder="username">
    <input id="password" type="password" placeholder="password">
    <button onclick="login()">Přihlásit</button>
    <button onclick="register()">Registrovat</button>
  </div>

  <div id="chat"></div>

  <div id="input" style="display:none; padding:10px;">
    <input id="prompt" placeholder="Zeptej se...">
    <button onclick="poslat()">Odeslat</button>
  </div>

</div>

<script>
const chat = document.getElementById("chat");

function msg(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function login() {
  const username = usernameEl.value;
  const password = passwordEl.value;

  const res = await fetch("/login", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({username,password})
  });

  if (res.ok) {
    loginDiv.style.display="none";
    chat.style.display="block";
    inputDiv.style.display="block";
  } else {
    alert("Chyba");
  }
}

async function register() {
  const username = usernameEl.value;
  const password = passwordEl.value;

  await fetch("/register", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({username,password})
  });

  alert("Registrováno");
}

async function poslat() {
  const text = promptEl.value;
  msg(text,"user");

  const res = await fetch("/ai", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({prompt:text})
  });

  const data = await res.json();
  msg(data.odpoved || data.error,"ai");
}
</script>

</body>
</html>
