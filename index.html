<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>TomChat</title>

<style>
  body {
    margin: 0;
    font-family: system-ui, Arial;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .container {
    width: 600px;
    height: 700px;
    background: #020617;
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    overflow: hidden;
  }

  h1 {
    margin: 0;
    padding: 15px;
    font-size: 18px;
    text-align: center;
    background: #0f12a;
    color: #ffff;
    border-bottom: 1px solid #334155;
  }

  #chat {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 10px;
    overflow-y: auto;
    gap: 10px;
  }

  .msg {
    padding: 10px 14px;
    border-radius: 16px;
    max-width: 75%;
    line-height: 1.4;
    box-shadow: 0 3px 8px rgba(0,0,0,0.3);
  }

  .user {
    background: #3b82f6;
    align-self: flex-end;
    border-bottom-right-radius: 5px;
  }

  .ai {
    background: #22c55e;
    align-self: flex-start;
    border-bottom-left-radius: 5px;
  }

  #input-area {
    display: flex;
    padding: 10px;
    border-top: 1px solid #334155;
  }

  input {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: none;
    outline: none;
    background: #1e293b;
    color: white;
  }

  button {
    margin-left: 8px;
    padding: 10px 15px;
    border: none;
    border-radius: 10px;
    background: #3b82f6;
    color: white;
    cursor: pointer;
  }

  button:hover {
    background: #2563eb;
  }
</style>
</head>

<body>

<div class="container">

  <h1>TomChat</h1>
<div id="login">
  <input id="username" placeholder="username">
  <input id="password" type="password" placeholder="password">
  <button onclick="login()">Přihlásit</button>
  <button onclick="register()">Registrovat</button>
</div>
  <div id="chat" style="display:none;">

  <div id="input-area">
    <input id="prompt" placeholder="Zeptej se...">
    <button onclick="poslat()">Odeslat</button>
  </div>

</div>

<script>
  async function login() {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  const res = await fetch("https://tomass.kurim.ithope.eu/login", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ username, password })
  });

  if (res.ok) {
    document.getElementById("login").style.display = "none";
    document.getElementById("chat").style.display = "block";
  } else {
    alert("Špatné údaje");
  }
}

async function register() {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  await fetch("/register", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ username, password })
  });

  alert("Registrováno");
}
const chat = document.getElementById("chat");

function pridejZpravu(text, typ) {
  const div = document.createElement("div");
  div.className = "msg " + typ;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function poslat() {
  const input = document.getElementById("prompt");
  const text = input.value.trim();

  if (!text) return;

  pridejZpravu(text, "user");
  input.value = "";

  const loading = document.createElement("div");
  loading.className = "msg ai";
  loading.innerText = "⏳ Přemýšlím...";
  chat.appendChild(loading);

  try {
    const res = await fetch("/ai", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ prompt: text })
    });

    const data = await res.json();
    loading.remove();
    pridejZpravu(data.odpoved || data.error, "ai");

  } catch {
    loading.remove();
    pridejZpravu("❌ Chyba", "ai");
  }
}

document.getElementById("prompt").addEventListener("keypress", function(e) {
  if (e.key === "Enter") poslat();
});
</script>

</body>
</html>
